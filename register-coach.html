<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register as a Coach | Magazine Africa</title>
  <link rel="stylesheet" href="coach.css">
</head>
<body>
  <div class="register-container">
    <h1>Become a Coach on Magazine Africa</h1>
    <form id="coachForm">
      <input type="text" placeholder="Full Name" required />
      <input type="email" placeholder="Email" required />
      <input type="tel" placeholder="Phone Number" required />
      <input type="text" placeholder="Coaching Category (e.g., Life, Business)" required />
      <textarea placeholder="Short Bio" required></textarea>
      <textarea placeholder="Services Offered" required></textarea>
      <button type="submit">Register</button>
    </form>
    <div id="message"></div>
  </div>

  <script src="coach.js"></script>
</body>
</html>
