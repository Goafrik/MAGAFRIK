<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up - TheMagAfrica</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="signup-form-page">

  <div class="form-wrapper">
    <h2>Sign Up to TheMagAfrica</h2>
    <p class="tagline">Create your free account today</p>

    <form action="#" method="post" class="signup-form">
      <label for="email">📧 Email address</label>
      <input type="email" id="email" name="email" required placeholder="e.g. you@example.com" />

      <label for="password">🔒 Password</label>
      <input type="password" id="password" name="password" required placeholder="" />

      <div class="remember-forgot">
        <label><input type="checkbox" /> Remember me</label>
        <a href="#">Forgot your password?</a>
      </div>

      <button type="submit" class="btn-submit">Create Account</button>

      <div class="signup-alt">
        <p>Or sign up with:</p>
        <button type="button" class="btn-google">Continue with Google</button>
      </div>

      <p class="have-account">
        Already have an account? <a href="signin.html">Sign in here</a>
      </p>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
