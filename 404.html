<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page Not Found - MagAfrik</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f4f4f4;
      font-family: 'Segoe UI', sans-serif;
    }

    .error-container {
      text-align: center;
    }

    .error-container h1 {
      font-size: 6rem;
      color: #ff6b6b;
    }

    .error-container h2 {
      font-size: 2rem;
      color: #333;
    }

    .error-container p {
      margin: 1rem 0;
      color: #666;
    }

    .error-container a {
      text-decoration: none;
      color: white;
      background-color: #00774f;
      padding: 12px 24px;
      border-radius: 5px;
      font-weight: bold;
      transition: 0.3s ease;
    }

    .error-container a:hover {
      background-color: #004c34;
    }
  </style>
</head>
<body>
  <div class="error-container">
    <h1>404</h1>
    <h2>Oops! Page not found</h2>
    <p>The page you’re looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
    <a href="index.html">Back to Home</a>
  </div>
</body>
</html>
